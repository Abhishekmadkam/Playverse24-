<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Runner - Mini Edition</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 50% 0%, #2a3f5e, #0a1a2a);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            cursor: none;
            touch-action: none;
            border: 2px solid #4af;
        }

        .game-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        .game-ui button {
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #4af;
            color: #4af;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .game-ui button:hover {
            background: #4af;
            color: #0a1a2a;
            transform: scale(1.05);
        }

        .score-container {
            background: rgba(0, 20, 40, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            gap: 20px;
            border: 2px solid #4af;
            font-family: 'Orbitron', sans-serif;
            color: #4af;
        }

        .speed-indicator {
            position: absolute;
            top: 70px;
            right: 15px;
            background: rgba(0, 20, 40, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ffd700;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .speed-bar {
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, #4af, #ffd700);
            width: 0%;
            transition: width 0.3s ease;
        }

        .jump-indicator {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 40, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            color: #4af;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #4af;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .jump-dots {
            display: flex;
            gap: 8px;
        }

        .jump-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(100, 200, 255, 0.3);
            transition: all 0.3s ease;
            border: 2px solid #4af;
        }

        .jump-dot.active {
            background: #4af;
            box-shadow: 0 0 20px #4af;
            transform: scale(1.2);
        }

        .phase-indicator {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4af, #a4f);
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            border: 2px solid white;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .phrase-collection {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .phrase-tag {
            background: linear-gradient(135deg, #4af, #a4f);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            box-shadow: 0 5px 20px rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            animation: slideUp 0.3s ease;
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 10, 20, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 20;
        }

        .menu-content {
            background: rgba(20, 30, 50, 0.95);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 3px #4af;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .menu-content h1 {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4af, #a4f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }

        .menu-content p {
            color: #9cf;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .btn-game {
            background: linear-gradient(135deg, #4af, #a4f);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 8px;
            border: 2px solid white;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-game:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px #4af;
        }

        .btn-game.secondary {
            background: transparent;
            border: 2px solid #4af;
            color: #4af;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .difficulty-btn {
            padding: 8px 20px;
            border: 2px solid #4af;
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 14px;
            color: #9cf;
        }

        .difficulty-btn.active {
            background: #4af;
            color: #0a1a2a;
            box-shadow: 0 0 20px #4af;
        }

        .controls-info {
            background: rgba(0, 20, 40, 0.7);
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            border: 2px solid #4af;
        }

        .controls-info h3 {
            color: #4af;
            margin-bottom: 15px;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            text-align: left;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9cf;
            font-size: 12px;
        }

        .control-key {
            background: #4af;
            color: #0a1a2a;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
            font-size: 12px;
            box-shadow: 0 0 10px #4af;
        }

        .achievement-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4af, #f4a);
            color: white;
            padding: 15px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 2px white;
            border: 2px solid #4af;
            font-weight: 600;
            font-size: 14px;
        }

        .achievement-toast.show {
            transform: translateX(0);
        }

        .achievement-toast i {
            font-size: 30px;
        }

        .pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 30, 50, 0.95);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 30;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 3px #4af;
            min-width: 300px;
            border: 2px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .pause-menu h2 {
            color: #4af;
            font-size: 28px;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 600px) {
            .score-container {
                padding: 6px 12px;
                font-size: 12px;
                gap: 10px;
            }
            
            .game-ui button {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            
            .jump-indicator {
                top: 60px;
                padding: 5px 12px;
                font-size: 12px;
            }
            
            .jump-dot {
                width: 8px;
                height: 8px;
            }
            
            .phase-indicator {
                top: 100px;
                font-size: 10px;
                padding: 4px 10px;
            }
            
            .speed-indicator {
                top: 60px;
                padding: 5px 10px;
                font-size: 10px;
            }
            
            .speed-bar {
                width: 40px;
                height: 4px;
            }
            
            .phrase-tag {
                padding: 5px 12px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Game UI -->
        <div class="game-ui">
            <button id="pauseBtn"><i class="fas fa-pause"></i></button>
            <div class="score-container">
                <span><i class="fas fa-microchip"></i> <span id="score">0</span></span>
                <span><i class="fas fa-bolt"></i> <span id="combo">x1</span></span>
                <span><i class="fas fa-arrow-up"></i> <span id="altitude">0</span></span>
            </div>
            <button id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>

        <!-- Speed Indicator -->
        <div class="speed-indicator">
            <i class="fas fa-tachometer-alt"></i>
            <span id="speedValue">1.0x</span>
            <div class="speed-bar">
                <div class="speed-fill" id="speedFill"></div>
            </div>
        </div>

        <!-- Jump Indicator -->
        <div class="jump-indicator">
            <span><i class="fas fa-rocket"></i></span>
            <div class="jump-dots">
                <div class="jump-dot" id="jump1"></div>
                <div class="jump-dot" id="jump2"></div>
                <div class="jump-dot" id="jump3"></div>
            </div>
        </div>

        <!-- Phase Indicator -->
        <div class="phase-indicator" id="phaseIndicator">
            ⚡ PHASE 1 ⚡
        </div>

        <!-- Phrase Collection -->
        <div class="phrase-collection" id="phraseCollection"></div>

        <!-- Main Menu -->
        <div class="menu-overlay" id="mainMenu">
            <div class="menu-content">
                <h1>ROBOT RUNNER</h1>
                <p>Mini Edition - Progressive Speed</p>
                
                <div class="controls-info">
                    <h3>CONTROLS</h3>
                    <div class="controls-grid">
                        <div class="control-item">
                            <span class="control-key">SPACE</span>
                            <span>Triple Jump</span>
                        </div>
                        <div class="control-item">
                            <span class="control-key">← →</span>
                            <span>Move Left/Right</span>
                        </div>
                        <div class="control-item">
                            <span class="control-key">↑</span>
                            <span>Move Up</span>
                        </div>
                        <div class="control-item">
                            <span class="control-key">↓</span>
                            <span>Move Down</span>
                        </div>
                        <div class="control-item">
                            <span class="control-key">SHIFT</span>
                            <span>Dash (P3)</span>
                        </div>
                        <div class="control-item">
                            <span class="control-key">TAP</span>
                            <span>Jump on Touch</span>
                        </div>
                    </div>
                </div>
                
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" data-difficulty="easy">EASY</button>
                    <button class="difficulty-btn" data-difficulty="medium">MEDIUM</button>
                    <button class="difficulty-btn" data-difficulty="hard">HARD</button>
                </div>

                <button class="btn-game" id="startGameBtn">START</button>
                <button class="btn-game secondary" id="highScoresBtn">HIGH SCORES</button>
            </div>
        </div>

        <!-- Pause Menu -->
        <div class="pause-menu" id="pauseMenu" style="display: none;">
            <h2>PAUSED</h2>
            <button class="btn-game" id="resumeBtn">RESUME</button>
            <button class="btn-game secondary" id="menuBtn">MENU</button>
        </div>

        <!-- Game Over Menu -->
        <div class="menu-overlay" id="gameOverMenu" style="display: none;">
            <div class="menu-content">
                <h1>GAME OVER</h1>
                <p style="font-size: 24px; color: #4af;">Score: <span id="finalScore">0</span></p>
                <p>Altitude: <span id="finalAltitude">0</span></p>
                <p>Phrases: <span id="finalPhrases">0</span></p>
                <p>Combo: <span id="finalCombo">0</span></p>
                <p>Speed: <span id="finalSpeed">1.0x</span></p>
                
                <button class="btn-game" id="restartBtn">TRY AGAIN</button>
                <button class="btn-game secondary" id="mainMenuBtn">MENU</button>
            </div>
        </div>

        <!-- Achievement Toast -->
        <div class="achievement-toast" id="achievementToast">
            <i class="fas fa-trophy"></i>
            <div>
                <div id="achievementTitle">ACHIEVEMENT!</div>
                <small id="achievementDesc"></small>
            </div>
        </div>
    </div>

    <script>
        class SkyRunner {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game state
                this.state = 'menu';
                this.difficulty = 'medium';
                this.score = 0;
                this.combo = 1;
                this.maxCombo = 1;
                this.altitude = 0;
                this.frameCount = 0;
                this.gamePhase = 1;
                
                // Speed progression (increases every 500 score for faster progression)
                this.baseSpeed = 1.8;
                this.currentSpeed = 1.8;
                this.scrollSpeed = 1.2;
                this.speedMultiplier = 1.0;
                this.lastSpeedIncreaseScore = 0;
                this.maxSpeedMultiplier = 2.5;
                
                // Robot player
                this.player = {
                    x: 350,
                    y: 400,
                    width: 35,
                    height: 40,
                    velocityX: 0,
                    velocityY: 0,
                    speed: 3.5,
                    jumpPower: -12,
                    gravity: 0.4,
                    jumpsRemaining: 3,
                    maxJumps: 3,
                    grounded: false,
                    dashing: false,
                    dashCooldown: 0,
                    
                    // Animation states
                    walkCycle: 0,
                    eyeBlink: 0,
                    antennaWiggle: 0,
                    isJumping: false,
                    isWalking: false
                };
                
                // Game objects
                this.obstacles = [];
                this.phrases = [];
                this.powerups = [];
                this.collectedPhrases = [];
                this.clouds = [];
                this.stars = [];
                this.particles = [];
                
                // Initialize stars
                for (let i = 0; i < 30; i++) {
                    this.stars.push({
                        x: Math.random() * 1500,
                        y: Math.random() * 1500,
                        size: 1 + Math.random() * 2,
                        blink: Math.random() * Math.PI * 2
                    });
                }
                
                // Initialize clouds
                for (let i = 0; i < 10; i++) {
                    this.clouds.push({
                        x: Math.random() * 1500,
                        y: Math.random() * 1500,
                        width: 80 + Math.random() * 80,
                        speed: 0.1 + Math.random() * 0.2,
                        opacity: 0.2 + Math.random() * 0.3
                    });
                }
                
                // Phrase categories
                this.phrasesByCategory = {
                    tech: ['CPU', 'RAM', 'ROM', 'AI', 'IO'],
                    actions: ['RUN', 'JUMP', 'FLY', 'BOOST', 'DASH'],
                    power: ['MAX', 'ULTRA', 'MEGA', 'GIGA', 'TERA'],
                    robot: ['BOT', 'MECH', 'CYBER', 'SYNC', 'CODE']
                };
                
                // Obstacle types
                this.obstacleTypes = [
                    { color: '#ff4444', width: 20, height: 20, pattern: 'triangle' },
                    { color: '#44aaff', width: 35, height: 15, pattern: 'rectangle' },
                    { color: '#ffaa44', width: 22, height: 22, pattern: 'circle' },
                    { color: '#aa44ff', width: 25, height: 25, pattern: 'hexagon' }
                ];
                
                // Power-up types
                this.powerupTypes = [
                    { color: '#ffd700', effect: 'jump', duration: 0, icon: '⬆' },
                    { color: '#44ff44', effect: 'speed', duration: 200, icon: '⚡' },
                    { color: '#ff4444', effect: 'shield', duration: 300, icon: '🛡' },
                    { color: '#44ffff', effect: 'magnet', duration: 250, icon: '🧲' }
                ];
                
                // Achievements
                this.achievements = {
                    firstCollection: false,
                    tripleJumpMaster: false,
                    altitudeMaster: false,
                    comboKing: false,
                    speedDemon: false
                };
                
                // Night mode
                this.nightMode = false;
                
                // Input handling
                this.keys = {};
                this.touchActive = false;
                this.touchX = 0;
                this.touchY = 0;
                this.spacePressed = false;
                
                // Spawn rates
                this.baseObstacleSpawnRate = 0.015;
                this.basePhraseSpawnRate = 0.03;
                this.basePowerupSpawnRate = 0.008;
                
                this.obstacleSpawnRate = this.baseObstacleSpawnRate;
                this.phraseSpawnRate = this.basePhraseSpawnRate;
                this.powerupSpawnRate = this.basePowerupSpawnRate;
                
                // Bind methods
                this.update = this.update.bind(this);
                this.draw = this.draw.bind(this);
                this.handleInput = this.handleInput.bind(this);
                
                // Initialize
                this.setupEventListeners();
                this.resize();
                
                // Start game loop
                this.gameLoop();
            }
            
            setupEventListeners() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    
                    if (e.key === ' ' || e.key === 'Space') {
                        e.preventDefault();
                        if (!this.spacePressed) {
                            this.spacePressed = true;
                            this.tripleJump();
                        }
                    }
                    
                    if (e.key === 'Shift') {
                        e.preventDefault();
                        this.dash();
                    }
                    
                    // Arrow down key for moving down
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                        this.player.velocityY = this.player.speed * 1.5;
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                    if (e.key === ' ' || e.key === 'Space') {
                        this.spacePressed = false;
                    }
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                        this.player.velocityY = 0;
                    }
                });
                
                // Touch controls
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.canvas.getBoundingClientRect();
                    this.touchX = touch.clientX - rect.left;
                    this.touchY = touch.clientY - rect.top;
                    this.touchActive = true;
                    this.handleTouch();
                    
                    if (window.navigator.vibrate) {
                        window.navigator.vibrate(5);
                    }
                });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.canvas.getBoundingClientRect();
                    this.touchX = touch.clientX - rect.left;
                    this.touchY = touch.clientY - rect.top;
                });
                
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.touchActive = false;
                    this.tripleJump();
                });
                
                // Mouse controls
                this.canvas.addEventListener('mousedown', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.touchX = e.clientX - rect.left;
                    this.touchY = e.clientY - rect.top;
                    this.touchActive = true;
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.touchActive) {
                        const rect = this.canvas.getBoundingClientRect();
                        this.touchX = e.clientX - rect.left;
                        this.touchY = e.clientY - rect.top;
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.touchActive = false;
                    this.tripleJump();
                });
                
                window.addEventListener('resize', () => this.resize());
                
                // UI Buttons
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
                document.getElementById('startGameBtn').addEventListener('click', () => this.startGame());
                document.getElementById('resumeBtn').addEventListener('click', () => this.resumeGame());
                document.getElementById('menuBtn').addEventListener('click', () => this.showMenu());
                document.getElementById('restartBtn').addEventListener('click', () => this.restartGame());
                document.getElementById('mainMenuBtn').addEventListener('click', () => this.showMenu());
                
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.difficulty = e.target.dataset.difficulty;
                        this.updateDifficulty();
                    });
                });
            }
            
            resize() {
                const container = this.canvas.parentElement;
                const containerWidth = container.clientWidth;
                const containerHeight = window.innerHeight * 0.9;
                
                this.canvas.width = Math.min(800, containerWidth - 20);
                this.canvas.height = Math.min(700, containerHeight);
                
                this.player.x = Math.min(this.player.x, this.canvas.width - this.player.width);
                this.player.y = Math.min(this.player.y, this.canvas.height - this.player.height);
            }
            
            updateDifficulty() {
                switch(this.difficulty) {
                    case 'easy':
                        this.baseObstacleSpawnRate = 0.01;
                        this.baseSpeed = 1.5;
                        this.player.speed = 3;
                        break;
                    case 'medium':
                        this.baseObstacleSpawnRate = 0.015;
                        this.baseSpeed = 1.8;
                        this.player.speed = 3.5;
                        break;
                    case 'hard':
                        this.baseObstacleSpawnRate = 0.02;
                        this.baseSpeed = 2.0;
                        this.player.speed = 4;
                        break;
                }
                this.resetSpeed();
            }
            
            resetSpeed() {
                this.currentSpeed = this.baseSpeed;
                this.scrollSpeed = this.baseSpeed * 0.7;
                this.speedMultiplier = 1.0;
                this.updateSpeedIndicator();
            }
            
            updateSpeedBasedOnScore() {
                const speedIncreaseThreshold = 500;
                const newMultiplier = 1.0 + Math.floor(this.score / speedIncreaseThreshold) * 0.2;
                this.speedMultiplier = Math.min(newMultiplier, this.maxSpeedMultiplier);
                
                this.currentSpeed = this.baseSpeed * this.speedMultiplier;
                this.scrollSpeed = (this.baseSpeed * 0.7) * this.speedMultiplier;
                
                this.obstacleSpawnRate = this.baseObstacleSpawnRate * (1 + (this.speedMultiplier - 1) * 0.4);
                this.phraseSpawnRate = this.basePhraseSpawnRate * (1 + (this.speedMultiplier - 1) * 0.3);
                this.powerupSpawnRate = this.basePowerupSpawnRate * (1 + (this.speedMultiplier - 1) * 0.2);
                
                this.updateSpeedIndicator();
            }
            
            updateSpeedIndicator() {
                const speedPercent = ((this.speedMultiplier - 1) / (this.maxSpeedMultiplier - 1)) * 100;
                document.getElementById('speedFill').style.width = `${speedPercent}%`;
                document.getElementById('speedValue').textContent = `${this.speedMultiplier.toFixed(1)}x`;
            }
            
            tripleJump() {
                if (this.state !== 'playing') return;
                
                if (this.player.jumpsRemaining > 0) {
                    const jumpIndex = this.player.maxJumps - this.player.jumpsRemaining;
                    const jumpStrength = this.player.jumpPower * (1 - jumpIndex * 0.15);
                    
                    this.player.velocityY = jumpStrength;
                    this.player.jumpsRemaining--;
                    this.player.isJumping = true;
                    
                    this.createJumpParticles();
                    this.updateJumpIndicator();
                }
            }
            
            createJumpParticles() {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: this.player.x + this.player.width/2,
                        y: this.player.y + this.player.height,
                        vx: (Math.random() - 0.5) * 3,
                        vy: Math.random() * 3,
                        life: 0.8,
                        color: '#4af'
                    });
                }
            }
            
            dash() {
                if (this.state !== 'playing' || this.gamePhase < 3) return;
                
                if (this.player.dashCooldown <= 0) {
                    this.player.dashing = true;
                    this.player.dashCooldown = 40;
                    
                    let dashX = 0, dashY = 0;
                    if (this.keys['ArrowLeft'] || this.keys['a']) dashX = -18;
                    if (this.keys['ArrowRight'] || this.keys['d']) dashX = 18;
                    if (this.keys['ArrowUp'] || this.keys['w']) dashY = -18;
                    if (this.keys['ArrowDown'] || this.keys['s']) dashY = 18;
                    
                    if (dashX === 0 && dashY === 0) {
                        dashX = 15;
                    }
                    
                    this.player.velocityX = dashX;
                    this.player.velocityY = dashY;
                    
                    setTimeout(() => {
                        this.player.dashing = false;
                    }, 150);
                }
            }
            
            updateJumpIndicator() {
                for (let i = 1; i <= 3; i++) {
                    const dot = document.getElementById(`jump${i}`);
                    if (i <= this.player.jumpsRemaining) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                }
            }
            
            togglePause() {
                if (this.state === 'playing') {
                    this.state = 'paused';
                    document.getElementById('pauseMenu').style.display = 'block';
                } else if (this.state === 'paused') {
                    this.resumeGame();
                }
            }
            
            resumeGame() {
                this.state = 'playing';
                document.getElementById('pauseMenu').style.display = 'none';
            }
            
            toggleTheme() {
                this.nightMode = !this.nightMode;
                const icon = document.querySelector('#themeToggle i');
                icon.className = this.nightMode ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            startGame() {
                this.state = 'playing';
                this.resetGame();
                document.getElementById('mainMenu').style.display = 'none';
            }
            
            resetGame() {
                this.score = 0;
                this.combo = 1;
                this.maxCombo = 1;
                this.altitude = 0;
                this.gamePhase = 1;
                this.obstacles = [];
                this.phrases = [];
                this.powerups = [];
                this.particles = [];
                this.collectedPhrases = [];
                this.player.x = this.canvas.width / 2;
                this.player.y = this.canvas.height - 100;
                this.player.velocityX = 0;
                this.player.velocityY = 0;
                this.player.jumpsRemaining = 3;
                
                this.resetSpeed();
                this.lastSpeedIncreaseScore = 0;
                
                this.updateJumpIndicator();
                document.getElementById('phaseIndicator').textContent = '⚡ PHASE 1 ⚡';
                this.updateUI();
            }
            
            restartGame() {
                this.resetGame();
                this.state = 'playing';
                document.getElementById('gameOverMenu').style.display = 'none';
            }
            
            showMenu() {
                this.state = 'menu';
                document.getElementById('mainMenu').style.display = 'flex';
                document.getElementById('pauseMenu').style.display = 'none';
                document.getElementById('gameOverMenu').style.display = 'none';
            }
            
            gameOver() {
                this.state = 'gameOver';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalAltitude').textContent = Math.floor(this.altitude);
                document.getElementById('finalPhrases').textContent = this.collectedPhrases.length;
                document.getElementById('finalCombo').textContent = this.maxCombo;
                document.getElementById('finalSpeed').textContent = `${this.speedMultiplier.toFixed(1)}x`;
                document.getElementById('gameOverMenu').style.display = 'flex';
                
                this.checkHighScore();
            }
            
            handleTouch() {
                if (this.state !== 'playing') return;
                
                if (this.gamePhase >= 1) {
                    this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, 
                                           this.touchX - this.player.width/2));
                }
                
                if (this.gamePhase >= 2) {
                    this.player.y = Math.max(0, Math.min(this.canvas.height - this.player.height, 
                                           this.touchY - this.player.height/2));
                }
            }
            
            handleInput() {
                if (this.state !== 'playing') return;
                
                const oldX = this.player.x;
                const oldY = this.player.y;
                
                // Apply gravity when not grounded
                if (!this.player.grounded && !this.touchActive) {
                    this.player.velocityY += this.player.gravity;
                }
                
                if (!this.player.dashing) {
                    this.player.velocityX *= 0.9;
                    if (!this.keys['ArrowDown'] && !this.keys['s'] && !this.touchActive) {
                        this.player.velocityY *= 0.9;
                    }
                }
                
                if (this.gamePhase >= 1) {
                    if (this.keys['ArrowLeft'] || this.keys['a']) {
                        this.player.velocityX = -this.player.speed;
                        this.player.isWalking = true;
                    }
                    if (this.keys['ArrowRight'] || this.keys['d']) {
                        this.player.velocityX = this.player.speed;
                        this.player.isWalking = true;
                    }
                }
                
                if (this.gamePhase >= 2) {
                    if (this.keys['ArrowUp'] || this.keys['w']) {
                        this.player.velocityY = -this.player.speed;
                        this.player.isWalking = true;
                    }
                    if (this.keys['ArrowDown'] || this.keys['s']) {
                        this.player.velocityY = this.player.speed * 1.5;
                        this.player.isWalking = true;
                    }
                }
                
                // Update walk cycle
                if (Math.abs(this.player.x - oldX) > 0.5 || Math.abs(this.player.y - oldY) > 0.5) {
                    this.player.walkCycle += 0.2;
                } else {
                    this.player.isWalking = false;
                }
                
                this.player.x += this.player.velocityX;
                this.player.y += this.player.velocityY;
                
                // Keep in bounds
                this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, this.player.x));
                this.player.y = Math.max(0, Math.min(this.canvas.height - this.player.height, this.player.y));
                
                // Ground detection
                if (this.player.y >= this.canvas.height - this.player.height) {
                    this.player.y = this.canvas.height - this.player.height;
                    this.player.velocityY = 0;
                    this.player.grounded = true;
                    this.player.isJumping = false;
                } else {
                    this.player.grounded = false;
                }
                
                if (this.player.dashCooldown > 0) {
                    this.player.dashCooldown--;
                }
                
                // Animation updates
                this.player.eyeBlink = (this.player.eyeBlink + 1) % 100;
                this.player.antennaWiggle = Math.sin(this.frameCount * 0.1) * 3;
            }
            
            spawnObstacle() {
                const type = Math.floor(Math.random() * this.obstacleTypes.length);
                const obstacle = {
                    ...this.obstacleTypes[type],
                    x: Math.random() * (this.canvas.width - 40),
                    y: -40,
                    speed: this.scrollSpeed + Math.random() * 1,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.02
                };
                this.obstacles.push(obstacle);
            }
            
            spawnPhrase() {
                const categories = Object.keys(this.phrasesByCategory);
                const category = categories[Math.floor(Math.random() * categories.length)];
                const phrases = this.phrasesByCategory[category];
                const phrase = phrases[Math.floor(Math.random() * phrases.length)];
                
                this.phrases.push({
                    text: phrase,
                    category: category,
                    x: Math.random() * (this.canvas.width - 80),
                    y: -30,
                    width: phrase.length * 12,
                    height: 25,
                    color: this.getCategoryColor(category),
                    speed: this.scrollSpeed + Math.random() * 0.8,
                    pulse: 0
                });
            }
            
            spawnPowerup() {
                const type = Math.floor(Math.random() * this.powerupTypes.length);
                this.powerups.push({
                    ...this.powerupTypes[type],
                    x: Math.random() * (this.canvas.width - 30),
                    y: -30,
                    width: 25,
                    height: 25,
                    speed: this.scrollSpeed + Math.random() * 1,
                    pulse: 0
                });
            }
            
            getCategoryColor(category) {
                const colors = {
                    tech: '#ff6b6b',
                    actions: '#4ecdc4',
                    power: '#ffe66d',
                    robot: '#d4a5a5'
                };
                return colors[category] || '#4af';
            }
            
            update() {
                if (this.state !== 'playing') return;
                
                this.frameCount++;
                
                // Update altitude
                this.altitude += this.scrollSpeed / 15;
                
                // Update speed based on score (every 500 points)
                if (Math.floor(this.score / 500) > Math.floor(this.lastSpeedIncreaseScore / 500)) {
                    this.lastSpeedIncreaseScore = this.score;
                    this.updateSpeedBasedOnScore();
                    
                    if (this.speedMultiplier < this.maxSpeedMultiplier) {
                        this.unlockAchievement('SPEED BOOST!', `${this.speedMultiplier.toFixed(1)}x`, 'speedDemon');
                    }
                }
                
                // Update game phase based on altitude
                if (this.altitude > 1000 && this.gamePhase < 2) {
                    this.gamePhase = 2;
                    document.getElementById('phaseIndicator').textContent = '⚡ PHASE 2 ⚡';
                    this.unlockAchievement('PHASE 2!', 'Vertical Movement', 'phaseMaster');
                } else if (this.altitude > 2500 && this.gamePhase < 3) {
                    this.gamePhase = 3;
                    document.getElementById('phaseIndicator').textContent = '⚡ PHASE 3 ⚡';
                    this.unlockAchievement('PHASE 3!', 'Dash Unlocked', 'phaseMaster');
                }
                
                // Regenerate jumps when touching bottom
                if (this.player.y >= this.canvas.height - this.player.height) {
                    this.player.jumpsRemaining = this.player.maxJumps;
                    this.updateJumpIndicator();
                }
                
                // Spawn objects
                if (Math.random() < this.obstacleSpawnRate) {
                    this.spawnObstacle();
                }
                if (Math.random() < this.phraseSpawnRate) {
                    this.spawnPhrase();
                }
                if (Math.random() < this.powerupSpawnRate) {
                    this.spawnPowerup();
                }
                
                // Update stars
                this.stars.forEach(star => {
                    star.y -= 0.2 * (this.scrollSpeed / 2);
                    if (star.y < 0) {
                        star.y = this.canvas.height;
                        star.x = Math.random() * this.canvas.width;
                    }
                });
                
                // Update clouds
                this.clouds.forEach(cloud => {
                    cloud.y -= cloud.speed * (this.scrollSpeed / 3);
                    if (cloud.y < -100) {
                        cloud.y = this.canvas.height + 100;
                        cloud.x = Math.random() * this.canvas.width;
                    }
                });
                
                // Update obstacles
                this.obstacles = this.obstacles.filter(obstacle => {
                    obstacle.y += obstacle.speed;
                    obstacle.rotation += obstacle.rotSpeed;
                    
                    const hasMagnet = this.powerups.some(p => p.effect === 'magnet' && p.active);
                    if (hasMagnet) {
                        const dx = this.player.x + this.player.width/2 - (obstacle.x + obstacle.width/2);
                        const dy = this.player.y + this.player.height/2 - (obstacle.y + obstacle.height/2);
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            obstacle.x += dx * 0.01;
                            obstacle.y += dy * 0.01;
                        }
                    }
                    
                    if (this.checkCollision(this.player, obstacle)) {
                        const hasShield = this.powerups.some(p => p.effect === 'shield' && p.active);
                        if (!hasShield) {
                            this.gameOver();
                        }
                        return false;
                    }
                    
                    return obstacle.y < this.canvas.height + 50;
                });
                
                // Update phrases
                this.phrases = this.phrases.filter(phrase => {
                    phrase.y += phrase.speed;
                    phrase.pulse = (phrase.pulse + 0.05) % (Math.PI * 2);
                    
                    if (this.checkCollision(this.player, phrase)) {
                        this.collectPhrase(phrase);
                        return false;
                    }
                    
                    return phrase.y < this.canvas.height + 50;
                });
                
                // Update powerups
                this.powerups = this.powerups.filter(powerup => {
                    powerup.y += powerup.speed;
                    powerup.pulse = (powerup.pulse + 0.03) % (Math.PI * 2);
                    
                    if (this.checkCollision(this.player, powerup)) {
                        this.activatePowerup(powerup);
                        return false;
                    }
                    
                    return powerup.y < this.canvas.height + 50;
                });
                
                // Update particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= 0.02;
                    return p.life > 0;
                });
                
                this.updateUI();
                this.checkAchievements();
            }
            
            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }
            
            collectPhrase(phrase) {
                this.score += 100 * this.combo;
                this.combo++;
                this.maxCombo = Math.max(this.maxCombo, this.combo);
                
                if (this.player.jumpsRemaining < this.player.maxJumps) {
                    this.player.jumpsRemaining++;
                    this.updateJumpIndicator();
                }
                
                this.collectedPhrases.push(phrase);
                
                for (let i = 0; i < 6; i++) {
                    this.particles.push({
                        x: phrase.x + phrase.width/2,
                        y: phrase.y + phrase.height/2,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 0.8,
                        color: phrase.color
                    });
                }
                
                const collection = document.getElementById('phraseCollection');
                const tag = document.createElement('div');
                tag.className = 'phrase-tag';
                tag.style.background = `linear-gradient(135deg, ${phrase.color}, ${phrase.color}dd)`;
                tag.textContent = phrase.text;
                collection.appendChild(tag);
                
                setTimeout(() => tag.remove(), 2000);
                
                this.updateSpeedBasedOnScore();
            }
            
            activatePowerup(powerup) {
                switch(powerup.effect) {
                    case 'jump':
                        this.player.jumpsRemaining = this.player.maxJumps;
                        this.updateJumpIndicator();
                        break;
                    case 'speed':
                        this.player.speed *= 2;
                        setTimeout(() => {
                            this.player.speed /= 2;
                        }, powerup.duration);
                        break;
                    case 'shield':
                        powerup.active = true;
                        setTimeout(() => {
                            powerup.active = false;
                        }, powerup.duration);
                        break;
                    case 'magnet':
                        powerup.active = true;
                        setTimeout(() => {
                            powerup.active = false;
                        }, powerup.duration);
                        break;
                }
                
                this.score += 200;
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('combo').textContent = `x${this.combo}`;
                document.getElementById('altitude').textContent = Math.floor(this.altitude);
            }
            
            checkAchievements() {
                if (!this.achievements.firstCollection && this.collectedPhrases.length > 0) {
                    this.unlockAchievement('FIRST!', 'Collected phrase', 'firstCollection');
                }
                
                if (!this.achievements.tripleJumpMaster && this.player.maxJumps === 3 && this.player.jumpsRemaining === 3) {
                    this.unlockAchievement('JUMP MASTER!', 'Triple jump', 'tripleJumpMaster');
                }
                
                if (!this.achievements.altitudeMaster && this.altitude >= 5000) {
                    this.unlockAchievement('HIGH ALTITUDE!', '5000m', 'altitudeMaster');
                }
                
                if (!this.achievements.comboKing && this.maxCombo >= 15) {
                    this.unlockAchievement('COMBO KING!', '15x combo', 'comboKing');
                }
            }
            
            unlockAchievement(title, desc, key) {
                this.achievements[key] = true;
                
                const toast = document.getElementById('achievementToast');
                document.getElementById('achievementTitle').textContent = title;
                document.getElementById('achievementDesc').textContent = desc;
                
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
            
            checkHighScore() {
                const highScore = localStorage.getItem('miniRunnerHighScore') || 0;
                if (this.score > highScore) {
                    localStorage.setItem('miniRunnerHighScore', this.score);
                    this.unlockAchievement('HIGH SCORE!', `${this.score}`, 'highScore');
                }
            }
            
            draw() {
                // Clear canvas
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, this.nightMode ? '#0a0f1a' : '#2a3f5e');
                gradient.addColorStop(1, this.nightMode ? '#0a1a2a' : '#1a2f4e');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw stars
                this.stars.forEach(star => {
                    const brightness = 0.5 + Math.sin(this.frameCount * 0.02 + star.blink) * 0.3;
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                
                // Draw clouds
                this.clouds.forEach(cloud => {
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
                    this.ctx.beginPath();
                    this.ctx.arc(cloud.x, cloud.y, cloud.width/3, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x + 20, cloud.y - 8, cloud.width/4, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x - 15, cloud.y - 5, cloud.width/4, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                
                // Draw obstacles
                this.obstacles.forEach(obstacle => {
                    this.ctx.save();
                    this.ctx.translate(obstacle.x + obstacle.width/2, obstacle.y + obstacle.height/2);
                    this.ctx.rotate(obstacle.rotation);
                    this.ctx.shadowColor = obstacle.color;
                    this.ctx.shadowBlur = 10;
                    this.ctx.fillStyle = obstacle.color;
                    
                    if (obstacle.pattern === 'circle') {
                        this.ctx.beginPath();
                        this.ctx.arc(0, 0, obstacle.width/2, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else if (obstacle.pattern === 'triangle') {
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, -obstacle.height/2);
                        this.ctx.lineTo(obstacle.width/2, obstacle.height/2);
                        this.ctx.lineTo(-obstacle.width/2, obstacle.height/2);
                        this.ctx.closePath();
                        this.ctx.fill();
                    } else {
                        this.ctx.fillRect(-obstacle.width/2, -obstacle.height/2, obstacle.width, obstacle.height);
                    }
                    this.ctx.restore();
                });
                
                // Draw phrases
                this.phrases.forEach(phrase => {
                    const pulseScale = 1 + Math.sin(phrase.pulse) * 0.05;
                    
                    this.ctx.save();
                    this.ctx.translate(phrase.x + phrase.width/2, phrase.y + phrase.height/2);
                    this.ctx.scale(pulseScale, pulseScale);
                    
                    this.ctx.shadowColor = phrase.color;
                    this.ctx.shadowBlur = 15;
                    this.ctx.fillStyle = phrase.color;
                    this.roundRect(-phrase.width/2, -phrase.height/2, phrase.width, phrase.height, 10);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 12px Orbitron';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(phrase.text, 0, 0);
                    
                    this.ctx.restore();
                });
                
                // Draw powerups
                this.powerups.forEach(powerup => {
                    this.ctx.save();
                    this.ctx.translate(powerup.x + 12, powerup.y + 12);
                    
                    this.ctx.shadowColor = powerup.color;
                    this.ctx.shadowBlur = 15;
                    
                    this.ctx.strokeStyle = 'white';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 14, 0, Math.PI * 2);
                    this.ctx.stroke();
                    
                    this.ctx.fillStyle = powerup.color;
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = '14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(powerup.icon, 0, 0);
                    
                    this.ctx.restore();
                });
                
                // Draw particles
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;
                
                // Draw robot
                this.drawRobot();
            }
            
            drawRobot() {
                const x = this.player.x;
                const y = this.player.y;
                const w = this.player.width;
                const h = this.player.height;
                
                const walkOffset = Math.sin(this.player.walkCycle) * (this.player.isWalking ? 2 : 0);
                const eyeScale = this.player.eyeBlink < 5 ? 0.1 : 1;
                const jumpCompress = this.player.isJumping ? 0.85 : 1;
                
                this.ctx.save();
                this.ctx.translate(x + w/2, y + h/2);
                
                // Body
                this.ctx.shadowColor = '#4af';
                this.ctx.shadowBlur = 15;
                
                const bodyGradient = this.ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
                bodyGradient.addColorStop(0, '#6cf');
                bodyGradient.addColorStop(1, '#2af');
                this.ctx.fillStyle = bodyGradient;
                this.roundRect(-w/2, -h/2 * jumpCompress, w, h * jumpCompress, 8);
                this.ctx.fill();
                
                // Head
                this.ctx.fillStyle = '#6cf';
                this.roundRect(-12, -28, 24, 12, 5);
                this.ctx.fill();
                
                // Antenna
                this.ctx.save();
                this.ctx.translate(0, -28);
                this.ctx.rotate(this.player.antennaWiggle * 0.05);
                
                this.ctx.fillStyle = '#ff0';
                this.ctx.beginPath();
                this.ctx.moveTo(-3, -6);
                this.ctx.lineTo(0, -12);
                this.ctx.lineTo(3, -6);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#f44';
                this.ctx.beginPath();
                this.ctx.arc(0, -14, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
                
                // Eyes
                this.ctx.fillStyle = '#fff';
                this.ctx.beginPath();
                this.ctx.arc(-6, -24, 4 * eyeScale, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(6, -24, 4 * eyeScale, 0, Math.PI * 2);
                this.ctx.fill();
                
                if (eyeScale > 0.5) {
                    this.ctx.fillStyle = '#00f';
                    this.ctx.beginPath();
                    this.ctx.arc(-7, -25, 1.5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(5, -25, 1.5, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                // Arms
                this.ctx.fillStyle = '#5ae';
                this.ctx.save();
                this.ctx.translate(-18, -5 + walkOffset);
                this.roundRect(-8, -3, 8, 6, 3);
                this.ctx.fill();
                this.ctx.restore();
                
                this.ctx.save();
                this.ctx.translate(18, -5 - walkOffset);
                this.roundRect(0, -3, 8, 6, 3);
                this.ctx.fill();
                this.ctx.restore();
                
                // Legs
                this.ctx.fillStyle = '#48c';
                this.ctx.save();
                this.ctx.translate(-9, 15 - walkOffset/2);
                this.roundRect(-6, 0, 12, 12, 3);
                this.ctx.fill();
                this.ctx.restore();
                
                this.ctx.save();
                this.ctx.translate(9, 15 + walkOffset/2);
                this.roundRect(-6, 0, 12, 12, 3);
                this.ctx.fill();
                this.ctx.restore();
                
                // Chest light
                this.ctx.shadowBlur = 15 + Math.sin(this.frameCount * 0.1) * 5;
                this.ctx.fillStyle = '#ff4';
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 5, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.restore();
            }
            
            roundRect(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.ctx.beginPath();
                this.ctx.moveTo(x + r, y);
                this.ctx.lineTo(x + w - r, y);
                this.ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                this.ctx.lineTo(x + w, y + h - r);
                this.ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.ctx.lineTo(x + r, y + h);
                this.ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                this.ctx.lineTo(x, y + r);
                this.ctx.quadraticCurveTo(x, y, x + r, y);
                this.ctx.closePath();
            }
            
            gameLoop() {
                this.handleInput();
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        window.addEventListener('load', () => {
            new SkyRunner();
        });
    </script>
</body>
</html>
